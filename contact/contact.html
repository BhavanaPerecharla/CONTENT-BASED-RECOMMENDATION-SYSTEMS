<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Bhavana Perecharla</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Times New Roman', Times, serif;
            background-image: url('an.jpg'); /* Replace with your background image URL */
            background-size: cover;
            background-position: center;
            color: #ffffff; /* Text color for the content */
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent black background for readability */
            max-width: 600px;
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .note p {
            font-weight: bold;
            color: #FF5733; /* Dark gray for note text */
            font-size: larger;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px); /* Adds a blur effect to the background */
            animation: fadeIn 0.5s ease-in-out;
        }

        .modal-content {
            background: linear-gradient(135deg, #ff8a00, #e52e71);
            color: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: 15% auto;
            border: 2px solid #FF5733;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            animation: slideDown 0.5s ease-in-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1.2em;
            background-color: #f9f9f9;
        }

        .submit-btn {
            padding: 10px 20px;
            font-size: 1.2em;
            color: #ffffff;
            background-color: #FF5733;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            position: relative;
            padding-right: 40px;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 87, 51, 0.7);
        }

        .btn-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .submit-btn:hover .btn-icon {
            opacity: 1;
            transform: translateY(-50%) scale(1.2);
        }

        .close-btn {
            padding: 10px 20px;
            font-size: 1.2em;
            color: #ffffff;
            background-color: #e52e71;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .close-btn:hover {
            background-color: #ff8a00;
        }

        /* Open Modal Button */
        .open-modal-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2em;
            color: #ffffff;
            background-color: #FF5733;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        .open-modal-btn:hover {
            background-color: #e52e71;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 87, 51, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Contact Me</h1>

            <div class="note">
                <p>If you have any questions or suggestions, please click the button below:</p>
            </div>

            <button class="open-modal-btn">Contact Me</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <h2>Contact Me</h2>
            <form action="send_contact.php" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="description" placeholder="Your Message" required></textarea>
                <button type="submit" class="submit-btn">
                    <span class="btn-text">Send</span>
                    <span class="btn-icon">&#10003;</span> <!-- Checkmark icon -->
                </button>
            </form>
            <button class="close-btn">Close</button>
        </div>
    </div>

    <script>
        // Get the modal
        var modal = document.getElementById("myModal");

        // Get the button that opens the modal
        var btn = document.querySelector(".open-modal-btn");

        // Get the <span> element that closes the modal
        var closeBtn = document.querySelector(".close-btn");

        // When the user clicks the button, open the modal 
        btn.onclick = function () {
            modal.style.display = "block";
        }

        // When the user clicks anywhere outside of the modal, close it
        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // When the user clicks the close button, close the modal
        closeBtn.onclick = function () {
            modal.style.display = "none";
        }
    </script>
</body>
</html>
